spring.application.name=shortener-backend
server.port=8080

# App configuration
app.host=snib.me
app.endpoint.notfound=https://snib.me?error=notfound

# Cors configuration
app.cors.allowed-origins=http://snib.me,https://snib.me,http://www.snib.me,https://www.snib.me

# jwks endpoint
app.oauth2.jwks.endpoint=https://account.snib.me/oauth2/jwks

# Rate limiting configuration
app.ratelimit.capacity=60
app.ratelimit.refill=60
app.ratelimit.minutes=1
app.ratelimit.initialTokens=30

# Backend configuration
shortener.backend.cache.shorturl.timeout=${SHORTENER_BACKEND_CACHE_SHORTURL.TIMEOUT:180}
shortener.backend.blacklist.words=snib.me,localhost,127.0,192.168,10.,::1,tinyurl.com,bit.ly

# Key Generator configuration
shortener.keygenerator.host=${SHORTENER_KEYGENERATOR_HOST:localhost}
shortener.keygenerator.port=${SHORTENER_KEYGENERATOR_PORT:8081}

# Url Service configuration
shortener.urlservice.host=${SHORTENER_URLSERVICE_HOST:localhost}
shortener.urlservice.port=${SHORTENER_URLSERVICE_PORT:8082}

# Redis configuration
spring.redis.host=${SPRING_REDIS_HOST:localhost}
spring.redis.port=${SPRING_REDIS_PORT:6379}
# spring.redis.username=myuser
# spring.redis.password=mypassword

# Expose actuator endpoints
management.endpoints.web.exposure.include=health,info
# Enable Kubernetes-style probes
management.endpoint.health.probes.enabled=true
# Show health details (optional but helpful)
management.endpoint.health.show-details=always


